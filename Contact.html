<section id="contact">
    <h2><a href="contact.html">Contactez-nous</a></h2>
    <div class="tabs">
        <button class="tab" data-target="#name">Nom</button>
        <button class="tab" data-target="#email">Email</button>
        <button class="tab" data-target="#message">Message</button>
    </div>
    <form>
        <div>
            <label for="name">Nom</label>
            <input type="text" id="name" name="name" placeholder="Votre nom" required>
        </div>
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Votre email" required>
        </div>
        <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Votre message" required></textarea>
        </div>
        <button type="submit" class="btn-blue">Envoyer</button>
    </form>
</section>
