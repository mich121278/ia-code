<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Découvrir Bruxelles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Découvrir Bruxelles</h1>
    <nav>
        <a href="#">Accueil</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<main>

<div class="image-container">
    <img src="./images/bruxelles.jpg" alt="Vue de Bruxelles">
</div>

<section class="info">
    <h2>Quelques endroits intéressants</h2>

    <ul>
        <li>Grand Place</li>
        <li>Atomium</li>
        <li>Parc du Cinquantenaire</li>
    </ul>

    <div class="search-tab">
        <form action="#" method="get">
            <label for="search-location">Ajouter un lieu :</label>
            <input type="text" id="search-location" name="location" placeholder="Entrez un lieu" aria-label="Ajouter un lieu">
            <button type="submit">🔍</button>
        </form>
    </div>
</section>

</main>

<footer>
    <p>© 2026 Découvrir Bruxelles - Tous droits réservés</p>
    <section id="contact">
        <h2>Contactez-nous</h2>
        <p>Envoyez-nous un message à contact@decouvrirbruxelles.com</p>
    </section>
</footer>

</body>
</html>
